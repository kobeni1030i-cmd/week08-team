<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>team</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-300 w-full min-h-screen p-8">
    <h1 class="font-bold text-xl p-4">登録選手</h1>
    <div class="flex gap-2 mb-4">
    <button id="ALL" class="bg-green-600 text-white p-3">ALL</button>
    <button id="FW" class="bg-green-600 text-white p-3">FW</button>
    <button id="MF" class="bg-green-600 text-white p-3">MF</button>
    <button id="DF" class="bg-green-600 text-white p-3">DF</button>
    <button id="GK" class="bg-green-600 text-white p-3">GK</button>
    </div>
    <section id="memberList" class="grid grid-cols-2 md:grid-cols-3 gap-8">
    </section>
    
</body>
<script>
    const members = [
        {name: "伊東純也", position: "FW", comment: "ナイスコーナー"},
        {name: "長友佑都", position: "DF", comment: "バモ"},
        {name: "鎌田大地", position: "MF", comment: "俺に従え"},
        {name: "前田大然", position: "FW", comment: "足が速い"},
        {name: "遠藤航", position: "MF", comment: "背中で語る男"},
        {name: "鈴木彩艶", position: "GK", comment: "絶好調"},
    ];

    const memberList = document.querySelector("#memberList");
    const ALL = document.querySelector("#ALL");
    const FW = document.querySelector("#FW");
    const MF = document.querySelector("#MF");
    const DF = document.querySelector("#DF");
    const GK = document.querySelector("#GK");

    function renderMembers(list) {
        memberList.innerHTML = "";
        list.forEach((member) => {
            const card = document.createElement("div");
            card.className = "bg-blue-600 rounded-lg shadow p-4 flex flex-col hover:shadow-xl";
            card.innerHTML = `
                <span class="text-lg font-bold text-indigo-600 bg-white p-2 shadow-lg">${member.name}</span>
                <span class="text-red-600 text-sm bg-pink-300 p-1">${member.position}</span>
                <p class="text-white mt-2">${member.comment}</p>
            `;
            memberList.appendChild(card);
        });
    }

    ALL.addEventListener("click", () => {
        renderMembers(members);
    });

    FW.addEventListener("click", () => {
        renderMembers(members.filter((member) => member.position === "FW"));
    });

    MF.addEventListener("click", () => {
        renderMembers(members.filter((member) => member.position === "MF"));
    });

    DF.addEventListener("click", () => {
        renderMembers(members.filter((member) => member.position === "DF"));
    });

    GK.addEventListener("click", () => {
        renderMembers(members.filter((member) => member.position === "GK"));
    });

    renderMembers(members);
</script>

</html>
